name: Windows GUI (experimental)

# On-demand: builds the Windows desktop app (GTK4) via MSYS2, bundles the GTK
# runtime and packages a test installer. Same build path as the release job, so
# it's the place to test GUI changes before cutting a release.
on:
  workflow_dispatch:

jobs:
  build:
    name: build + package moraine-gui
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            git
            mingw-w64-ucrt-x86_64-gtk4
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-rust
            mingw-w64-ucrt-x86_64-binutils

      - name: Build moraine-gui (gui, no tray)
        run: cargo build --release --no-default-features --features gui --bin moraine-gui

      - name: Bundle GTK runtime
        run: bash packaging/windows/bundle-gtk.sh

      - name: Package test installer
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { choco install innosetup --no-progress -y }
          $ver = (Get-Content Cargo.toml | Where-Object { $_ -match '^version = "(.+)"' } |
                  Select-Object -First 1 | ForEach-Object { $Matches[1] })
          $src = (Resolve-Path "bundle").Path
          & $iscc "/DMyAppVersion=$ver-test" "/DSrcDir=$src" packaging\windows\moraine-gui.iss
          Copy-Item "packaging\windows\Output\moraine-gui-$ver-test-setup.exe" .

      - uses: actions/upload-artifact@v4
        with:
          name: moraine-gui-windows
          path: moraine-gui-*-setup.exe
          if-no-files-found: error
