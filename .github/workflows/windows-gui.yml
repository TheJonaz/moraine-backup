name: Windows GUI (experimental)

# On-demand: builds moraine-gui (GTK4) on Windows via MSYS2, assembles a
# self-contained GTK runtime bundle, and uploads it as a zip. Also reports whether
# GStreamer is a hard dependency of GTK (i.e. whether it can be trimmed).
on:
  workflow_dispatch:

jobs:
  build:
    name: build + bundle moraine-gui
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            git
            mingw-w64-ucrt-x86_64-gtk4
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-rust
            mingw-w64-ucrt-x86_64-binutils

      - name: Build moraine-gui (gui, no tray)
        run: cargo build --release --no-default-features --features gui --bin moraine-gui

      - name: Diagnose GStreamer (direct imports of libgtk)
        run: |
          echo "=== libgtk-4-1.dll direct imports containing 'gst' ==="
          if objdump -p /ucrt64/bin/libgtk-4-1.dll | awk '/DLL Name:/{print $3}' | grep -i gst; then
            echo ">> GStreamer IS a hard dependency of GTK — cannot trim without rebuilding GTK."
          else
            echo ">> GStreamer is NOT hard-linked by GTK — trimmable."
          fi

      - name: Assemble bundle
        run: |
          set -e
          BIN=/ucrt64/bin
          mkdir -p bundle
          cp target/release/moraine-gui.exe bundle/

          # gdk-pixbuf image loaders (for icons) + a relative-path cache.
          PBVER=$(ls /ucrt64/lib/gdk-pixbuf-2.0)
          LOADERS="bundle/lib/gdk-pixbuf-2.0/$PBVER/loaders"
          mkdir -p "$LOADERS"
          cp $BIN/../lib/gdk-pixbuf-2.0/$PBVER/loaders/*.dll "$LOADERS/"
          ( cd "$LOADERS" && gdk-pixbuf-query-loaders.exe *.dll > ../loaders.cache )

          # Full working DLL closure of the exe + the loaders (from /ucrt64/bin).
          { ldd bundle/moraine-gui.exe; for l in "$LOADERS"/*.dll; do ldd "$l"; done; } \
            | awk '{print $3}' | grep -iE '^/ucrt64/bin/' | sort -u \
            | while read -r d; do cp -n "$d" bundle/ || true; done

          # If GStreamer is trimmable, drop its DLLs (unused media backend).
          if ! objdump -p /ucrt64/bin/libgtk-4-1.dll | awk '/DLL Name:/{print $3}' | grep -qi gst; then
            rm -f bundle/libgst*.dll && echo "Trimmed GStreamer DLLs."
          fi

          # Compiled GSettings schemas (GTK reads these at startup).
          mkdir -p bundle/share/glib-2.0/schemas
          cp /ucrt64/share/glib-2.0/schemas/gschemas.compiled bundle/share/glib-2.0/schemas/ 2>/dev/null \
            || glib-compile-schemas /ucrt64/share/glib-2.0/schemas --targetdir bundle/share/glib-2.0/schemas

          # Icon themes (Adwaita for the app's symbolic icons, hicolor as fallback).
          mkdir -p bundle/share/icons
          cp -r /ucrt64/share/icons/Adwaita bundle/share/icons/
          cp -r /ucrt64/share/icons/hicolor bundle/share/icons/ 2>/dev/null || true
          # Install our own icon into hicolor so set_icon_name("moraine") resolves
          # the window/taskbar icon.
          for s in 16 24 32 48 64 128 256; do
            mkdir -p "bundle/share/icons/hicolor/${s}x${s}/apps"
            cp "assets/moraine-${s}.png" "bundle/share/icons/hicolor/${s}x${s}/apps/moraine.png"
          done
          mkdir -p bundle/share/icons/hicolor/scalable/apps
          cp assets/moraine.svg bundle/share/icons/hicolor/scalable/apps/moraine.svg
          gtk4-update-icon-cache.exe -q -t -f bundle/share/icons/Adwaita || true
          gtk4-update-icon-cache.exe -q -t -f bundle/share/icons/hicolor || true

          # App icon for the installer shortcuts.
          cp assets/moraine.ico bundle/

          echo "=== bundle: $(du -sh bundle | cut -f1), $(ls bundle/*.dll | wc -l) DLLs ==="

      - name: Build installer + zip
        shell: pwsh
        run: |
          Compress-Archive -Path bundle/* -DestinationPath moraine-gui-windows.zip -Force
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { choco install innosetup --no-progress -y }
          $ver = (Get-Content Cargo.toml | Where-Object { $_ -match '^version = "(.+)"' } |
                  Select-Object -First 1 | ForEach-Object { $Matches[1] })
          $src = (Resolve-Path "bundle").Path
          & $iscc "/DMyAppVersion=$ver-test" "/DSrcDir=$src" packaging\windows\moraine-gui.iss
          Copy-Item "packaging\windows\Output\moraine-gui-$ver-test-setup.exe" .
          Get-Item moraine-gui-*-setup.exe,moraine-gui-windows.zip | Select-Object Name,Length

      - uses: actions/upload-artifact@v4
        with:
          name: moraine-gui-windows
          path: |
            moraine-gui-*-setup.exe
            moraine-gui-windows.zip
          if-no-files-found: error
