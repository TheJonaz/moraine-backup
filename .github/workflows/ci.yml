name: CI

# Build and test on every desktop OS we target, so a change that breaks the
# Windows or macOS build is caught here rather than at release time.
on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build & test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # The GTK 4 GUI links the system GTK libraries.
      - name: Install GTK (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-4-dev
      - name: Install GTK (macOS)
        if: runner.os == 'macOS'
        run: brew install gtk4 pkgconf

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # Linux/macOS build the full app (CLI + GTK GUI). Windows builds the CLI
      # only for now — bundling GTK on Windows is a separate effort.
      - name: Build (CLI + GUI)
        if: runner.os != 'Windows'
        run: cargo build --workspace --all-targets --verbose
      - name: Build (CLI only)
        if: runner.os == 'Windows'
        run: cargo build --no-default-features --bin moraine --verbose

      # The test suite lives in the library and is feature-independent.
      - name: Test
        run: cargo test --no-default-features --verbose

  lint:
    name: fmt & clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install GTK
        run: sudo apt-get update && sudo apt-get install -y libgtk-4-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings

  # Dependency advisories (RustSec). The tree is deliberately small — this
  # keeps it that way: a newly-disclosed vulnerability in any dependency
  # fails CI instead of shipping silently.
  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-audit
      - run: cargo audit
