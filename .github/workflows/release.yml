name: Release

# On a version tag (e.g. v0.1.1) build release artifacts and attach them to a
# GitHub Release. Linux ships the full app (CLI + GTK GUI) plus a .deb; macOS
# and Windows ship the CLI for now (bundling GTK there is separate work).
# Can also be dispatched manually against an existing tag.
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to (re)build and upload assets for'
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  release:
    name: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: moraine-linux-x86_64
          - os: macos-latest
            artifact: moraine-macos-arm64
          - os: windows-latest
            artifact: moraine-windows-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      # The GTK GUI is built on Linux only; macOS/Windows build the CLI.
      - name: Install GTK (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-4-dev

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build (Linux — CLI + GUI)
        if: runner.os == 'Linux'
        run: cargo build --release --bins

      - name: Build (macOS/Windows — CLI)
        if: runner.os != 'Linux'
        run: cargo build --release --no-default-features --bin moraine

      # ── Linux: both binaries + docs, plus a .deb ──
      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist/${{ matrix.artifact }}
          cp target/release/moraine target/release/moraine-gui dist/${{ matrix.artifact }}/
          cp README.md CHANGELOG.md LICENSE moraine.example.toml dist/${{ matrix.artifact }}/
          tar -C dist -czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}
          cargo install cargo-deb --locked
          cargo deb --no-build -o moraine_${{ env.RELEASE_TAG }}_amd64.deb

      # ── macOS: CLI binary + docs ──
      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist/${{ matrix.artifact }}
          cp target/release/moraine dist/${{ matrix.artifact }}/
          cp README.md CHANGELOG.md LICENSE moraine.example.toml dist/${{ matrix.artifact }}/
          tar -C dist -czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}

      # ── Windows: CLI binary + docs (zip) and an Inno Setup installer ──
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/${{ matrix.artifact }} | Out-Null
          Copy-Item target/release/moraine.exe dist/${{ matrix.artifact }}/
          Copy-Item README.md,CHANGELOG.md,LICENSE,moraine.example.toml dist/${{ matrix.artifact }}/
          Compress-Archive -Path dist/${{ matrix.artifact }} -DestinationPath ${{ matrix.artifact }}.zip
          # Installer: Inno Setup (preinstalled on windows-latest; install if not).
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { choco install innosetup --no-progress -y }
          $ver = "${{ env.RELEASE_TAG }}".TrimStart('v')
          $src = (Resolve-Path "dist/${{ matrix.artifact }}").Path
          & $iscc "/DMyAppVersion=$ver" "/DSrcDir=$src" packaging\windows\moraine.iss
          Copy-Item "packaging\windows\Output\moraine-$ver-setup.exe" .

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.zip
            moraine-*-setup.exe
            moraine_*_amd64.deb
          fail_on_unmatched_files: false
          generate_release_notes: true

  # ── Fedora RPM (CLI + GUI), built from packaging/rpm/moraine.spec ──
  # Pinned to fedora:44 so the dist tag stays .fc44; bump when moving to a newer
  # Fedora. `nodejs` is installed first because actions/checkout needs it inside
  # the container.
  rpm:
    name: rpm (Fedora)
    runs-on: ubuntu-latest
    container: fedora:44
    steps:
      - name: Install build deps
        run: >
          dnf -y install rust cargo gcc gtk4-devel pkgconf-pkg-config
          desktop-file-utils rpm-build rpmdevtools git tar nodejs
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
      - name: Build RPM
        run: |
          set -eux
          VER="${RELEASE_TAG#v}"
          rpmdev-setuptree
          sed -i "s/^Version:.*/Version:        ${VER}/" packaging/rpm/moraine.spec
          git config --global --add safe.directory "$PWD"
          git archive --prefix="moraine-backup-${VER}/" \
            -o ~/rpmbuild/SOURCES/moraine-${VER}.tar.gz HEAD
          rpmbuild -bb packaging/rpm/moraine.spec
          cp ~/rpmbuild/RPMS/x86_64/moraine-${VER}-1.*.x86_64.rpm .
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: moraine-*.rpm
          fail_on_unmatched_files: false

  # ── Arch package (CLI + GUI), built from packaging/aur/PKGBUILD ──
  arch:
    name: arch (pkg.tar.zst)
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - name: Install build deps
        run: pacman -Syu --noconfirm --needed base-devel git sudo rust gtk4 nodejs
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
      - name: Build package
        run: |
          set -eux
          VER="${RELEASE_TAG#v}"
          useradd -m builder
          cp packaging/aur/PKGBUILD .
          # Build the released tag; skip source checksums (it's our own tag) and
          # the test suite (already run by the CI workflow).
          sed -i "s/^pkgver=.*/pkgver=${VER}/" PKGBUILD
          chown -R builder:builder .
          # --nodeps: don't require runtime deps (rsync/openssh) to be installed
          # just to build the package; the build deps (rust, gtk4) already are.
          sudo -u builder makepkg --skipchecksums --nocheck --nodeps --noconfirm -f
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: "*.pkg.tar.zst"
          fail_on_unmatched_files: false

  # ── Windows desktop app (GTK4) — built via MSYS2, bundled with the GTK runtime ──
  # Ships alongside the Windows CLI zip/installer as a one-click app installer.
  windows-gui:
    name: windows desktop app (GTK)
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            git
            mingw-w64-ucrt-x86_64-gtk4
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-rust
            mingw-w64-ucrt-x86_64-binutils
      - name: Build moraine-gui
        run: cargo build --release --no-default-features --features gui --bin moraine-gui
      - name: Bundle GTK runtime
        run: bash packaging/windows/bundle-gtk.sh
      - name: Package installer
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { choco install innosetup --no-progress -y }
          $ver = "${{ env.RELEASE_TAG }}".TrimStart('v')
          $src = (Resolve-Path "bundle").Path
          & $iscc "/DMyAppVersion=$ver" "/DSrcDir=$src" packaging\windows\moraine-gui.iss
          Copy-Item "packaging\windows\Output\moraine-gui-$ver-setup.exe" .
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: moraine-gui-*-setup.exe
          fail_on_unmatched_files: false

  # ── Bump the downstream packaging recipes (AUR, Homebrew, nixpkgs, winget, …) ──
  # Runs after the packages are built and uploaded, so the source tarball and the
  # Windows zip exist for the checksums. deploy/bump-recipes.sh refreshes every
  # recipe's version + checksums and commits the result back to main. Pushed with
  # GITHUB_TOKEN, which by design does NOT re-trigger workflows — no release loop.
  # Idempotent: a re-dispatched build whose recipes are already current is a no-op.
  recipes:
    name: bump downstream recipes
    needs: [release, rpm, arch]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Bump recipes and commit to main
        run: |
          set -eux
          VER="${RELEASE_TAG#v}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # --no-push: commit only; we push HEAD:main explicitly (robust regardless
          # of branch/detached state). Skips committing if already at VER.
          deploy/bump-recipes.sh "$VER" --no-push
          if git log --oneline -1 | grep -q "bump downstream recipes to v${VER}\$"; then
            git push origin HEAD:main
          else
            echo "recipes already at ${VER} — nothing to push"
          fi

  # ── CDN publish (cdn.thern.io) is pull-based, not pushed from here ──
  # The CDN host firewalls inbound SSH, so GitHub Actions cannot push to it.
  # Instead the host pulls: deploy/cdn-pull.sh — run by a systemd timer on the
  # server (deploy/systemd/) — polls this repo's latest release, downloads the
  # .deb/.rpm/.pkg.tar.zst and runs deploy/cdn-publish.sh locally. So there is
  # nothing to do in this workflow: publishing the GitHub Release above is
  # enough, and the CDN refreshes within the timer interval. See
  # docs/releasing.md for the one-time server setup.
