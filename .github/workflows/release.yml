name: Release

# On a version tag (e.g. v0.1.1) build release artifacts and attach them to a
# GitHub Release. Linux ships the full app (CLI + GTK GUI) plus a .deb; macOS
# and Windows ship the CLI for now (bundling GTK there is separate work).
# Can also be dispatched manually against an existing tag.
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to (re)build and upload assets for'
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  release:
    name: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: moraine-linux-x86_64
          - os: macos-latest
            artifact: moraine-macos-arm64
          - os: windows-latest
            artifact: moraine-windows-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      # The GTK GUI is built on Linux only; macOS/Windows build the CLI.
      - name: Install GTK (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-4-dev

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build (Linux — CLI + GUI)
        if: runner.os == 'Linux'
        run: cargo build --release --bins

      - name: Build (macOS/Windows — CLI)
        if: runner.os != 'Linux'
        run: cargo build --release --no-default-features --bin moraine

      # ── Linux: both binaries + docs, plus a .deb ──
      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist/${{ matrix.artifact }}
          cp target/release/moraine target/release/moraine-gui dist/${{ matrix.artifact }}/
          cp README.md CHANGELOG.md LICENSE moraine.example.toml dist/${{ matrix.artifact }}/
          tar -C dist -czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}
          cargo install cargo-deb --locked
          cargo deb --no-build -o moraine_${{ env.RELEASE_TAG }}_amd64.deb

      # ── macOS: CLI binary + docs ──
      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist/${{ matrix.artifact }}
          cp target/release/moraine dist/${{ matrix.artifact }}/
          cp README.md CHANGELOG.md LICENSE moraine.example.toml dist/${{ matrix.artifact }}/
          tar -C dist -czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}

      # ── Windows: CLI binary + docs ──
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/${{ matrix.artifact }} | Out-Null
          Copy-Item target/release/moraine.exe dist/${{ matrix.artifact }}/
          Copy-Item README.md,CHANGELOG.md,LICENSE,moraine.example.toml dist/${{ matrix.artifact }}/
          Compress-Archive -Path dist/${{ matrix.artifact }} -DestinationPath ${{ matrix.artifact }}.zip

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.zip
            moraine_*_amd64.deb
          fail_on_unmatched_files: false
          generate_release_notes: true

  # ── Fedora RPM (CLI + GUI), built from packaging/rpm/moraine.spec ──
  # Pinned to fedora:44 so the dist tag stays .fc44; bump when moving to a newer
  # Fedora. `nodejs` is installed first because actions/checkout needs it inside
  # the container.
  rpm:
    name: rpm (Fedora)
    runs-on: ubuntu-latest
    container: fedora:44
    steps:
      - name: Install build deps
        run: >
          dnf -y install rust cargo gcc gtk4-devel pkgconf-pkg-config
          desktop-file-utils rpm-build rpmdevtools git tar nodejs
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
      - name: Build RPM
        run: |
          set -eux
          VER="${RELEASE_TAG#v}"
          rpmdev-setuptree
          sed -i "s/^Version:.*/Version:        ${VER}/" packaging/rpm/moraine.spec
          git config --global --add safe.directory "$PWD"
          git archive --prefix="moraine-backup-${VER}/" \
            -o ~/rpmbuild/SOURCES/moraine-${VER}.tar.gz HEAD
          rpmbuild -bb packaging/rpm/moraine.spec
          cp ~/rpmbuild/RPMS/x86_64/moraine-${VER}-1.*.x86_64.rpm .
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: moraine-*.rpm
          fail_on_unmatched_files: false

  # ── Arch package (CLI + GUI), built from packaging/aur/PKGBUILD ──
  arch:
    name: arch (pkg.tar.zst)
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - name: Install build deps
        run: pacman -Syu --noconfirm --needed base-devel git sudo rust gtk4 nodejs
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
      - name: Build package
        run: |
          set -eux
          VER="${RELEASE_TAG#v}"
          useradd -m builder
          cp packaging/aur/PKGBUILD .
          # Build the released tag; skip source checksums (it's our own tag) and
          # the test suite (already run by the CI workflow).
          sed -i "s/^pkgver=.*/pkgver=${VER}/" PKGBUILD
          chown -R builder:builder .
          # --nodeps: don't require runtime deps (rsync/openssh) to be installed
          # just to build the package; the build deps (rust, gtk4) already are.
          sudo -u builder makepkg --skipchecksums --nocheck --nodeps --noconfirm -f
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: "*.pkg.tar.zst"
          fail_on_unmatched_files: false

  # ── Publish the built packages to cdn.thern.io ──
  # Downloads the release assets and hands them to deploy/cdn-publish.sh on the
  # CDN host, which refreshes the apt/dnf/pacman repo metadata so clients see the
  # new version. No-op unless the CDN secrets are set, so forks stay safe.
  #
  # One-time server setup (as CDN_USER on the CDN host):
  #   * install deploy/cdn-publish.sh as ~/cdn-publish.sh (chmod +x)
  #   * add the deploy key's PUBLIC half to ~/.ssh/authorized_keys
  #   * verify the paths at the top of cdn-publish.sh match the real repos
  # Repo secrets to add (Settings → Secrets → Actions):
  #   CDN_SSH_KEY — the private deploy key (passphrase-less)
  #   CDN_HOST    — cdn.thern.io
  #   CDN_USER    — notroot
  cdn:
    name: publish to CDN
    needs: [release, rpm, arch]
    runs-on: ubuntu-latest
    steps:
      - name: Download release packages
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p staging
          gh release download "$RELEASE_TAG" -R "$GITHUB_REPOSITORY" -D staging \
            -p 'moraine_*_amd64.deb' -p 'moraine-*.x86_64.rpm' \
            -p 'moraine-*-x86_64.pkg.tar.zst'
          ls -l staging

      - name: Publish to CDN
        env:
          CDN_SSH_KEY: ${{ secrets.CDN_SSH_KEY }}
          CDN_HOST: ${{ secrets.CDN_HOST }}
          CDN_USER: ${{ secrets.CDN_USER }}
        run: |
          if [ -z "$CDN_SSH_KEY" ] || [ -z "$CDN_HOST" ] || [ -z "$CDN_USER" ]; then
            echo "CDN_SSH_KEY/CDN_HOST/CDN_USER not set — skipping CDN publish."
            exit 0
          fi
          VER="${RELEASE_TAG#v}"
          umask 077
          printf '%s\n' "$CDN_SSH_KEY" > "$HOME/cdn_key"
          chmod 600 "$HOME/cdn_key"
          mkdir -p "$HOME/.ssh"
          ssh-keyscan -H "$CDN_HOST" >> "$HOME/.ssh/known_hosts" 2>/dev/null || true
          SSH="ssh -i $HOME/cdn_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new"
          $SSH "$CDN_USER@$CDN_HOST" 'rm -rf /tmp/cdn-incoming && mkdir -p /tmp/cdn-incoming'
          scp -i "$HOME/cdn_key" -o StrictHostKeyChecking=accept-new \
            staging/* "$CDN_USER@$CDN_HOST:/tmp/cdn-incoming/"
          $SSH "$CDN_USER@$CDN_HOST" "bash ~/cdn-publish.sh '$VER' /tmp/cdn-incoming"
          rm -f "$HOME/cdn_key"
