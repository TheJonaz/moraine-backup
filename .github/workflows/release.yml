name: Release

# On a version tag (e.g. v0.1.1) build release artifacts and attach them to a
# GitHub Release. Linux ships the full app (CLI + GTK GUI) plus a .deb; macOS
# and Windows ship the CLI for now (bundling GTK there is separate work).
# Can also be dispatched manually against an existing tag.
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to (re)build and upload assets for'
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  release:
    name: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: moraine-linux-x86_64
          - os: macos-latest
            artifact: moraine-macos-arm64
          - os: windows-latest
            artifact: moraine-windows-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      # The GTK GUI is built on Linux only; macOS/Windows build the CLI.
      - name: Install GTK (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-4-dev

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build (Linux — CLI + GUI)
        if: runner.os == 'Linux'
        run: cargo build --release --bins

      - name: Build (macOS/Windows — CLI)
        if: runner.os != 'Linux'
        run: cargo build --release --no-default-features --bin moraine

      # ── Linux: both binaries + docs, plus a .deb ──
      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist/${{ matrix.artifact }}
          cp target/release/moraine target/release/moraine-gui dist/${{ matrix.artifact }}/
          cp README.md CHANGELOG.md LICENSE moraine.example.toml dist/${{ matrix.artifact }}/
          tar -C dist -czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}
          cargo install cargo-deb --locked
          cargo deb --no-build -o moraine_${{ env.RELEASE_TAG }}_amd64.deb

      # ── macOS: CLI binary + docs ──
      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist/${{ matrix.artifact }}
          cp target/release/moraine dist/${{ matrix.artifact }}/
          cp README.md CHANGELOG.md LICENSE moraine.example.toml dist/${{ matrix.artifact }}/
          tar -C dist -czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}

      # ── Windows: CLI binary + docs ──
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/${{ matrix.artifact }} | Out-Null
          Copy-Item target/release/moraine.exe dist/${{ matrix.artifact }}/
          Copy-Item README.md,CHANGELOG.md,LICENSE,moraine.example.toml dist/${{ matrix.artifact }}/
          Compress-Archive -Path dist/${{ matrix.artifact }} -DestinationPath ${{ matrix.artifact }}.zip

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.zip
            moraine_*_amd64.deb
          fail_on_unmatched_files: false
          generate_release_notes: true
