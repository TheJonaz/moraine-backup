<?xml version="1.0" encoding="UTF-8"?>
<svg width="1600" height="1000" viewBox="0 0 1600 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- navy som skiftar ljust (upptill) → mörkt (nedtill) -->
    <linearGradient id="base" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#16304a"/>
      <stop offset="1" stop-color="#0a1626"/>
    </linearGradient>
    <!-- blå glöd uppe till höger -->
    <radialGradient id="glow1" cx="0.85" cy="0.16" r="0.55">
      <stop offset="0" stop-color="#2e8be0" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#2e8be0" stop-opacity="0"/>
    </radialGradient>
    <!-- blå glöd nere till vänster -->
    <radialGradient id="glow2" cx="0.12" cy="0.86" r="0.55">
      <stop offset="0" stop-color="#1e6fb7" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#1e6fb7" stop-opacity="0"/>
    </radialGradient>
    <!-- diskret rutnät -->
    <pattern id="grid" width="46" height="46" patternUnits="userSpaceOnUse">
      <path d="M46 0 H0 V46" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1600" height="1000" fill="url(#base)"/>
  <rect width="1600" height="1000" fill="url(#grid)"/>
  <rect width="1600" height="1000" fill="url(#glow1)"/>
  <rect width="1600" height="1000" fill="url(#glow2)"/>
</svg>
