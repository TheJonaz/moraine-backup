# moraine.toml — one or more [[target]] blocks.
# Run `moraine run --dry-run` when you're done editing.

[[target]]
# Short name. Used as the folder on the target and with --target.
name = "nas"

# IP or hostname.
host = "192.168.1.50"

# SSH user.
user = "backup"

# SSH port. Optional, default 22.
port = 22

# Path to the private SSH key. Optional — omit to use ssh-agent.
key = "~/.ssh/backup_ed25519"

# Root directory on the target. Snapshots go to <dest>/<name>/<timestamp>/.
dest = "/volume1/backups"

# Files and directories on the client to back up.
sources = [
    "/home/jonaz/documents",
    "/home/jonaz/pictures",
]

# rsync exclude patterns. Optional.
exclude = [
    "*.tmp",
    "node_modules",
    ".cache",
]

# Add more targets by copying the block:
# [[target]]
# name = "offsite"
# host = "backup.example.com"
# user = "jonaz"
# dest = "/srv/backups"
# sources = ["/home/jonaz/documents"]

# rclone backend (cloud, FTP, SMB, WebDAV ...). First run `rclone config` to
# create a remote, then set backend = "rclone" and host = the remote name.
# Works with e.g. ftp, sftp, smb, webdav, s3, drive, b2, ...
# [[target]]
# name = "cloud"
# backend = "rclone"
# host = "myremote"       # rclone remote (empty = local path)
# dest = "backups"        # path within the remote
# sources = ["/home/jonaz/documents"]
#
# [target.retention]
# keep_last = 7
# keep_monthly = 6

# FTP backend (credentials in the config, no rclone config needed):
# [[target]]
# name = "ftp"
# backend = "ftp"
# host = "ftp.example.com"
# user = "jonaz"
# password = "..."        # stored in plain text — chmod 600 moraine.toml
# port = 21
# dest = "backups"
# sources = ["/home/jonaz/documents"]
